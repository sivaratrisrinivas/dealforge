<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dealforge</title>
  <style>
    html, body { background: #fdf5f5; color: #2d2223; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif; }
    body { min-height: 100vh; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <p class="site-header__kicker">Dealforge</p>
      <h1 class="site-header__title">From messy requirements to deployment-grade Fal blueprints.</h1>
      <p class="site-header__desc">Paste a client email or requirement. Get a ready-to-run Python script and the exact commands to run and deploy it.</p>
    </header>

    <main class="site-main">
      <section class="input-section">
        <label class="input-section__label" for="client-email">Client requirements</label>
        <textarea id="client-email" class="input-section__textarea" rows="8" placeholder="Paste an email thread, statement of work, or requirement summary..."></textarea>
        <div class="input-section__actions">
          <button type="button" class="btn btn--secondary" id="mock-email">Try with sample request</button>
          <button type="button" class="btn btn--primary" id="generate">Generate blueprint</button>
        </div>
      </section>

      <div id="message" class="message" role="alert" hidden></div>
      <div id="loading" class="loading" hidden>
        <span class="loading__dot"></span>
        <span class="loading__dot"></span>
        <span class="loading__dot"></span>
      </div>

      <div id="result" class="result" hidden>
        <div class="result__nav">
          <span id="result-step-label" class="result__step-label">1 of 3</span>
          <div class="result__nav-btns">
            <button type="button" class="btn btn--secondary" id="result-back">Back</button>
            <button type="button" class="btn btn--primary" id="result-next">Next</button>
          </div>
        </div>
        <div id="result-step-1" class="result-step">
          <h2 class="result-step__title">Python script</h2>
          <p class="result-step__hint">Save this as <code>app.py</code> in your project.</p>
          <pre class="result-step__code"><code id="result-code"></code></pre>
        </div>
        <div id="result-step-2" class="result-step" hidden>
          <h2 class="result-step__title">What this blueprint does</h2>
          <ul id="result-explanation" class="result-step__notes"></ul>
        </div>
        <div id="result-step-3" class="result-step" hidden>
          <h2 class="result-step__title">Run and deploy</h2>
          <div id="result-readme" class="result-step__readme"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
